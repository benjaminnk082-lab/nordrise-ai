# SANDBOX BUILD CONFIG — distinct from apps/control/electron-builder.yml on
# every field that influences install location, NSIS registry keys, the
# OS Add/Remove Programs entry, and GitHub release artefacts. If you ever
# run `npm run package` in this directory, the resulting installer must
# coexist with the live Nordrise Control install on the same machine and
# MUST NEVER publish to the public release feed (the auto-updater on every
# user's machine watches that feed; a dev build appearing there would force
# everyone onto a rough sandbox build).
appId: tech.bennyk.nordrise.control.dev
productName: Nordrise Control Dev
artifactName: "Nordrise Dev Installer.${ext}"
copyright: "© 2026 Benjamin Nicolai Kleiven / Nordrise"

directories:
  output: release
  buildResources: ../installer/assets

files:
  - dist/**/*
  - "!**/*.map"
  - package.json

extraResources:
  - from: dist/assets
    to: assets

asar: true
compression: maximum

# `publish` deliberately omitted — dev builds are local-only. To produce a
# real release, push a `control-v*` tag and let the GitHub Actions workflow
# do it from apps/control/.

win:
  target:
    - target: nsis
      arch: [x64]
  icon: ../installer/assets/nordrise-icon.ico
  # See apps/control/electron-builder.yml for the publisherName rationale.

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  installerIcon: ../installer/assets/nordrise-icon.ico
  uninstallerIcon: ../installer/assets/nordrise-icon.ico
  installerHeaderIcon: ../installer/assets/nordrise-icon.ico
  deleteAppDataOnUninstall: false
  shortcutName: "Nordrise Control Dev"
  createDesktopShortcut: true
  createStartMenuShortcut: true
  include: ../installer/nordrise-installer.nsh
